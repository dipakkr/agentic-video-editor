# Local dev stack for the Agentic Video Editor.
#   docker compose up --build
# Brings up Postgres (projects/EDL/job state), Redis (job queue + progress bus),
# MinIO (S3-compatible object storage), the FastAPI backend, an arq worker, and the
# Next.js frontend.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ave
      POSTGRES_PASSWORD: ave
      POSTGRES_DB: ave
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ave"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}
    environment:
      DATABASE_URL: postgresql+psycopg://ave:ave@db:5432/ave
      REDIS_URL: redis://redis:6379/0
      AVE_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      AVE_DATA_DIR: /data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["8000:8000"]
    volumes: ["mediadata:/data"]

  worker:
    build: ./backend
    depends_on:
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}
    environment:
      REDIS_URL: redis://redis:6379/0
      AVE_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      AVE_DATA_DIR: /data
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes: ["mediadata:/data"]
    command: ["arq", "ave.worker.tasks.WorkerSettings"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]

volumes:
  dbdata:
  miniodata:
  mediadata:
